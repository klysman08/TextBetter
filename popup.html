<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextBetter Popup</title>
  <style>
    /* Popup styling using same zinc variables */
    :root {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --border: 240 5.9% 90%;
      --radius: 0.5rem;
    }

    .dark {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-foreground: 240 5.9% 10%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-size: 0.875rem;
      padding: 1.25rem;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      border-b: 1px solid hsl(var(--border));
      padding-bottom: 0.75rem;
    }

    .title-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: bold;
    }

    .logo-symbol {
      color: hsl(var(--foreground));
      animation: rotate 10s infinite linear;
      display: inline-block;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Card Box */
    .card {
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 1rem;
      background-color: hsl(var(--card));
      margin-bottom: 1rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Switch Style */
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .switch-label {
      font-weight: 500;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      transition: .2s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: hsl(var(--foreground));
      transition: .2s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: hsl(var(--primary));
    }

    input:checked + .slider:before {
      transform: translateX(16px);
      background-color: hsl(var(--primary-foreground));
    }

    /* Theme Toggle */
    .theme-toggle-btn {
      background: none;
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      color: inherit;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      transition: background-color 0.2s;
    }

    .theme-toggle-btn:hover {
      background-color: hsl(var(--accent));
    }

    .sun-icon { display: block; }
    .moon-icon { display: none; }
    .dark .sun-icon { display: none; }
    .dark .moon-icon { display: block; }

    /* Model Status */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      border-top: 1px solid hsl(var(--border));
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-weight: 500;
      padding: 0.125rem 0.375rem;
      border-radius: 9999px;
      font-size: 0.7rem;
    }

    .status-badge.ok {
      background-color: rgba(34, 197, 94, 0.15);
      color: rgb(34, 197, 94);
    }

    .status-badge.error {
      background-color: rgba(239, 68, 68, 0.15);
      color: rgb(239, 68, 68);
    }

    .status-badge.warn {
      background-color: rgba(245, 158, 11, 0.15);
      color: rgb(245, 158, 11);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: currentColor;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .btn-primary {
      background-color: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      border-color: hsl(var(--primary));
    }

    .btn-primary:hover {
      background-color: hsl(var(--primary) / 0.9);
    }

    .btn-outline {
      background-color: transparent;
      color: hsl(var(--foreground));
      border-color: hsl(var(--border));
    }

    .btn-outline:hover {
      background-color: hsl(var(--accent));
    }

    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      margin-top: 1rem;
    }

    .footer a {
      color: inherit;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <div class="title-wrapper">
      <span class="logo-symbol">✦</span>
      <span class="logo">TextBetter</span>
    </div>
    <button class="theme-toggle-btn" id="popup-theme-toggle" type="button">
      <span class="sun-icon">☀️ Mode</span>
      <span class="moon-icon">🌙 Mode</span>
    </button>
  </header>

  <main>
    <div class="card">
      <div class="switch-container">
        <span class="switch-label">Writing Assistant</span>
        <label class="switch">
          <input type="checkbox" id="extension-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="status-row">
        <span>API Key Status</span>
        <span id="api-status-badge" class="status-badge warn">
          <span class="dot"></span>Checking
        </span>
      </div>

      <div class="status-row" id="model-row" style="border: none; padding: 0; margin-top: 0.25rem;">
        <span>Active Model</span>
        <span id="active-model-name" style="font-weight: 500;">gemini-3.1-flash-lite</span>
      </div>
    </div>

    <button class="btn btn-primary" id="open-settings-btn" type="button">Configure settings</button>
  </main>

  <footer class="footer">
    Select text on any page to begin writing.
  </footer>

  <script src="popup.js"></script>
</body>
</html>
