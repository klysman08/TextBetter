<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextBetter Popup</title>
  
  <!-- Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Theme Variables (HSL Zinc Color Palette) */
    :root {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --border: 240 5.9% 90%;
      --radius: 0.5rem;
      --radius-sm: 0.25rem;
    }

    .dark {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-foreground: 240 5.9% 10%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-size: 0.875rem;
      padding: 1.25rem;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    /* Header styling */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid hsl(var(--border));
      padding-bottom: 0.75rem;
    }

    .title-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-symbol {
      color: hsl(var(--foreground));
      width: 1.1rem;
      height: 1.1rem;
      animation: rotate 12s infinite linear;
      display: inline-block;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Header Action Button Group */
    .header-actions {
      display: flex;
      gap: 0.35rem;
    }

    /* Theme & Sound Toggles */
    .theme-toggle-btn {
      background: none;
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      cursor: pointer;
      padding: 0.35rem 0.65rem;
      color: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      transition: all 0.2s ease;
    }

    .theme-toggle-btn:hover {
      background-color: hsl(var(--accent));
      border-color: hsl(var(--border));
    }

    .sun-icon { display: inline-flex; align-items: center; gap: 0.25rem; }
    .moon-icon { display: none; align-items: center; gap: 0.25rem; }
    .dark .sun-icon { display: none; }
    .dark .moon-icon { display: inline-flex; align-items: center; gap: 0.25rem; }

    .sound-on-icon { display: inline-flex; align-items: center; gap: 0.25rem; }
    .sound-off-icon { display: none; align-items: center; gap: 0.25rem; }
    .muted .sound-on-icon { display: none; }
    .muted .sound-off-icon { display: inline-flex; align-items: center; gap: 0.25rem; }

    /* Card Layouts */
    .card {
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 1rem;
      background-color: hsl(var(--card));
      margin-bottom: 1rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Toggle Switch Container */
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .switch-label {
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* Premium Minimal Switch Style */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      transition: background-color .2s ease;
      border-radius: 9999px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: hsl(var(--foreground));
      transition: transform .2s ease;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: hsl(var(--primary));
    }

    input:checked + .slider:before {
      transform: translateX(16px);
      background-color: hsl(var(--primary-foreground));
    }

    /* Status Rows */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      border-top: 1px solid hsl(var(--border));
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.7rem;
    }

    .status-badge.ok {
      background-color: rgba(34, 197, 94, 0.1);
      color: rgb(34, 197, 94);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .status-badge.error {
      background-color: rgba(239, 68, 68, 0.1);
      color: rgb(239, 68, 68);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .status-badge.warn {
      background-color: rgba(245, 158, 11, 0.1);
      color: rgb(245, 158, 11);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background-color: currentColor;
    }

    /* Dashboard Grid */
    .dash-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      color: hsl(var(--muted-foreground));
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .dash-stat {
      border: 1px solid hsl(var(--border));
      background-color: hsl(var(--muted) / 0.5);
      border-radius: var(--radius);
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .dash-stat-label {
      font-size: 0.6rem;
      color: hsl(var(--muted-foreground));
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .dash-stat-val {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .clear-btn {
      background: none;
      border: none;
      color: hsl(var(--muted-foreground));
      cursor: pointer;
      font-size: 0.65rem;
      text-decoration: underline;
      padding: 2px;
      font-weight: 500;
      transition: color 0.15s;
    }

    .clear-btn:hover {
      color: hsl(var(--foreground));
    }

    /* Visual Token Ratio Graph */
    .token-split-section {
      border-top: 1px solid hsl(var(--border));
      padding-top: 0.75rem;
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .token-split-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: hsl(var(--muted-foreground));
    }

    .token-split-lbl strong {
      color: hsl(var(--foreground));
      font-weight: 600;
    }

    .token-ratio-bar {
      height: 6px;
      width: 100%;
      background-color: hsl(var(--muted));
      border-radius: 9999px;
      display: flex;
      overflow: hidden;
      border: 1px solid hsl(var(--border));
    }

    .ratio-fill {
      height: 100%;
      transition: width 0.3s ease;
    }

    .input-fill {
      background-color: hsl(var(--muted-foreground));
    }

    .output-fill {
      background-color: hsl(var(--primary));
    }

    /* Action Usage Bar Chart */
    .chart-section {
      border-top: 1px solid hsl(var(--border));
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }

    .chart-header-lbl {
      font-size: 0.65rem;
      color: hsl(var(--muted-foreground));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .chart-container {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-top: 0.35rem;
    }

    .chart-row {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .chart-row-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .chart-row-name {
      color: hsl(var(--foreground));
    }

    .chart-row-count {
      color: hsl(var(--muted-foreground));
      font-weight: 600;
    }

    .chart-row-bar-bg {
      height: 5px;
      width: 100%;
      background-color: hsl(var(--muted));
      border-radius: 9999px;
      overflow: hidden;
    }

    .chart-row-bar-fill {
      height: 100%;
      background-color: hsl(var(--primary));
      border-radius: 9999px;
      width: 0%;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .empty-chart {
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
      text-align: center;
      padding: 0.75rem 0;
      font-style: italic;
    }

    /* Configuration Action Button */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 2.35rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      border-color: hsl(var(--primary));
    }

    .btn-primary:hover {
      background-color: hsl(var(--primary) / 0.9);
    }

    /* Footer styling */
    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: hsl(var(--muted-foreground));
      margin-top: 1rem;
      line-height: 1.4;
    }

    .footer a {
      color: inherit;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="title-wrapper">
      <svg class="logo-symbol" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L14.85 9.15L22 12L14.85 14.85L12 22L9.15 14.85L2 12L9.15 9.15L12 2Z" />
      </svg>
      <span class="logo">TextBetter</span>
    </div>
    <div class="header-actions">
      <button class="theme-toggle-btn" id="popup-sound-toggle" type="button" aria-label="Toggle Sound">
        <span class="sound-on-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
          Sound
        </span>
        <span class="sound-off-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="22" y1="9" x2="16" y2="15"></line>
            <line x1="16" y1="9" x2="22" y2="15"></line>
          </svg>
          Mute
        </span>
      </button>
      <button class="theme-toggle-btn" id="popup-theme-toggle" type="button" aria-label="Toggle Theme">
        <span class="sun-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
          Light
        </span>
        <span class="moon-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>
          Dark
        </span>
      </button>
    </div>
  </header>

  <!-- Main Config Section -->
  <main>
    <!-- Card 1: Toggle & Connection Status -->
    <div class="card">
      <div class="switch-container">
        <span class="switch-label">Writing Assistant</span>
        <label class="switch" aria-label="Enable Writing Assistant">
          <input type="checkbox" id="extension-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="status-row">
        <span>API Connection</span>
        <span id="api-status-badge" class="status-badge warn">
          <span class="dot"></span>Checking
        </span>
      </div>

      <div class="status-row" id="model-row" style="border: none; padding: 0; margin-top: 0.35rem;">
        <span>Active Model</span>
        <span id="active-model-name" style="font-weight: 600; color: hsl(var(--foreground));">gemini-3.5-flash</span>
      </div>
    </div>

    <!-- Card 2: Analytics Dashboard -->
    <div class="card">
      <div class="dash-title">
        <span>Usage Dashboard</span>
        <button id="clear-stats-btn" class="clear-btn" type="button">Reset Stats</button>
      </div>
      
      <div class="dash-grid">
        <div class="dash-stat">
          <span class="dash-stat-label">Requests</span>
          <span class="dash-stat-val" id="stat-requests">0</span>
        </div>
        <div class="dash-stat">
          <span class="dash-stat-label">Total Tokens</span>
          <span class="dash-stat-val" id="stat-tokens">0</span>
        </div>
        <div class="dash-stat" style="grid-column: span 2;">
          <span class="dash-stat-label">Top Action</span>
          <span class="dash-stat-val" id="stat-top-action" style="font-size: 0.8rem; font-weight: 600;">None yet</span>
        </div>
      </div>

      <!-- Token Distribution Ratio Bar -->
      <div class="token-split-section">
        <div class="token-split-labels">
          <span class="token-split-lbl">Input: <strong id="token-input-val">0</strong></span>
          <span class="token-split-lbl">Output: <strong id="token-output-val">0</strong></span>
        </div>
        <div class="token-ratio-bar">
          <div id="token-ratio-input" class="ratio-fill input-fill" style="width: 50%;"></div>
          <div id="token-ratio-output" class="ratio-fill output-fill" style="width: 50%;"></div>
        </div>
      </div>

      <!-- Action Usage Progress Bars -->
      <div class="chart-section">
        <div class="chart-header-lbl">Action Breakdown</div>
        <div id="chart-bars-container" class="chart-container">
          <div class="empty-chart">No actions used yet</div>
        </div>
      </div>
    </div>

    <!-- Configure Actions button -->
    <button class="btn btn-primary" id="open-settings-btn" type="button">Configure prompts & settings</button>
  </main>

  <!-- Footer -->
  <footer class="footer">
    Select text on any webpage to open the rewrite assistant bar.
  </footer>

  <script src="popup.js"></script>
</body>
</html>
